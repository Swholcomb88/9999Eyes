<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9,999 Eyes</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14161a">
<meta name="description" content="9,999 lives. A pair of eyes for each — or none at all. A seeded anthology.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --granite:#14161a;
    --granite-2:#1d2026;
    --stone:#262a32;
    --bone:#e8e2d4;
    --bone-dim:#a9a396;
    --verdigris:#6fa08c;
    --candle:#c9a45c;
    --carve:#0b0c0f;
    --hairline:#33383f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  body{
    background:var(--granite);
    background-image:radial-gradient(ellipse 80% 50% at 50% -10%, #22262e 0%, var(--granite) 60%);
    color:var(--bone);
    font-family:'EB Garamond',Georgia,serif;
    font-size:1.125rem;
    line-height:1.7;
    min-height:100vh;
  }
  a{color:var(--verdigris)}
  .wrap{max-width:960px;margin:0 auto;padding:0 1.25rem 5rem}

  /* ---------- Masthead ---------- */
  header.masthead{
    text-align:center;
    padding:4rem 1rem 2.5rem;
    border-bottom:1px solid var(--hairline);
    margin-bottom:2.5rem;
  }
  .masthead h1{
    font-family:'Cinzel',serif;
    font-weight:700;
    font-size:clamp(2rem,6vw,3.4rem);
    letter-spacing:.14em;
    color:var(--bone);
    text-shadow:0 2px 0 var(--carve), 0 -1px 0 rgba(255,255,255,.06);
  }
  .masthead .epitaph{
    font-style:italic;
    color:var(--bone-dim);
    margin-top:.75rem;
    font-size:1.05rem;
    letter-spacing:.04em;
  }
  .masthead .tally{
    display:inline-block;
    margin-top:1.5rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.8rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--candle);
    border:1px solid var(--hairline);
    border-radius:2px;
    padding:.45rem 1.1rem;
    background:var(--granite-2);
  }

  /* ---------- Headstone index ---------- */
  .yard{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:2rem 1.75rem;
    align-items:end;
  }
  .stone{
    display:block;
    text-decoration:none;
    color:inherit;
    background:linear-gradient(180deg,var(--stone) 0%,var(--granite-2) 100%);
    border:1px solid var(--hairline);
    border-bottom:4px solid var(--carve);
    border-radius:130px 130px 6px 6px;   /* the arch */
    padding:2.2rem 1.4rem 1.6rem;
    text-align:center;
    position:relative;
    transition:transform .25s ease, border-color .25s ease;
  }
  .stone:hover,.stone:focus-visible{
    transform:translateY(-4px);
    border-color:var(--verdigris);
    outline:none;
  }
  .stone:focus-visible{box-shadow:0 0 0 3px rgba(111,160,140,.45)}
  .stone .art{
    width:96px;height:96px;
    margin:0 auto 1rem;
    border-radius:50%;
    object-fit:cover;
    object-position:center 20%;
    border:2px solid var(--hairline);
    background:var(--carve);
    display:block;
  }
  .stone .art.empty{
    display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;font-size:1.6rem;color:var(--bone-dim);
  }
  .stone .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--bone-dim);
  }
  .stone h2{
    font-family:'Cinzel',serif;
    font-weight:600;
    font-size:1.15rem;
    letter-spacing:.08em;
    margin:.5rem 0 .8rem;
    color:var(--bone);
    text-shadow:0 1px 0 var(--carve);
  }
  .stone .seed{
    font-family:'IBM Plex Mono',monospace;
    font-size:.78rem;
    color:var(--candle);
    letter-spacing:.12em;
  }
  .stone .era{
    font-style:italic;
    color:var(--bone-dim);
    font-size:.95rem;
    margin-top:.55rem;
  }

  /* ---------- Empty state ---------- */
  .fallow{
    text-align:center;
    padding:5rem 1rem;
    border:1px dashed var(--hairline);
    border-radius:6px;
    color:var(--bone-dim);
  }
  .fallow .glyph{font-family:'Cinzel',serif;font-size:2.4rem;color:var(--verdigris)}
  .fallow p{max-width:34ch;margin:1rem auto 0;font-style:italic}

  /* ---------- Story reader ---------- */
  .reader{display:none;max-width:680px;margin:0 auto}
  .reader.active{display:block}
  .yard-view{display:block}
  body.reading .yard-view{display:none}
  .reader .backlink{
    font-family:'IBM Plex Mono',monospace;
    font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--bone-dim);text-decoration:none;
  }
  .reader .backlink:hover{color:var(--verdigris)}
  .reader header{
    text-align:center;
    margin:2rem 0 2.5rem;
    padding-bottom:2rem;
    border-bottom:1px solid var(--hairline);
  }
  .reader .art-hero{
    max-width:340px;width:100%;
    border-radius:170px 170px 6px 6px;
    border:1px solid var(--hairline);
    margin:0 auto 1.5rem;display:block;
  }
  .reader .num{
    font-family:'IBM Plex Mono',monospace;
    font-size:.75rem;letter-spacing:.24em;text-transform:uppercase;
    color:var(--bone-dim);
  }
  .reader h1{
    font-family:'Cinzel',serif;font-weight:700;
    font-size:clamp(1.5rem,4.5vw,2.3rem);
    letter-spacing:.1em;margin:.7rem 0;
    text-shadow:0 2px 0 var(--carve);
  }
  .reader .seedline{
    font-family:'IBM Plex Mono',monospace;
    font-size:.8rem;color:var(--candle);letter-spacing:.14em;
  }
  .reader .era{font-style:italic;color:var(--bone-dim);margin-top:.6rem}
  .reader .story p{margin-bottom:1.35em;text-align:justify;hyphens:auto}
  .reader .story p:first-of-type::first-letter{
    font-family:'Cinzel',serif;
    font-size:3.2em;line-height:.85;
    float:left;padding:.08em .12em 0 0;
    color:var(--verdigris);
  }
  .reader .farewell{
    margin-top:3rem;text-align:center;
    font-style:italic;color:var(--candle);
    letter-spacing:.05em;
  }
  .reader .farewell::before{
    content:"";display:block;width:60px;height:1px;
    background:var(--hairline);margin:0 auto 1.5rem;
  }
  nav.turn{
    display:flex;justify-content:space-between;gap:1rem;
    margin-top:3.5rem;padding-top:1.5rem;
    border-top:1px solid var(--hairline);
    font-family:'IBM Plex Mono',monospace;
    font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;
  }
  nav.turn a{text-decoration:none;color:var(--bone-dim)}
  nav.turn a:hover{color:var(--verdigris)}
  nav.turn .spacer{flex:1}

  footer.colophon{
    text-align:center;margin-top:5rem;
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
    color:#5a5e66;
  }
</style>
</head>
<body>
<div class="wrap">

    <header class="masthead">
      <h1>9,999 Eyes</h1>
      <p class="epitaph">Nine thousand, nine hundred ninety-nine lives. A pair of eyes for each — or none at all.</p>

    <div id="yard"></div>
  </div>

  <article class="reader" id="reader"></article>

  <footer class="colophon">seeded &middot; lived &middot; recorded</footer>
</div>

    farewell: "Увидимся в другой жизни, brother. We will see each other in another life.",
    story: [
      "They warn you about the smell before anything else. Nitric acid does not smell like danger — it smells like something already dead, sweet and sharp at once, and after a month on the fueling crews it lives so deep in your sinuses that bread tastes of it, tea tastes of it, your wife’s hair would taste of it if you had a wife, which I did not, because I was twenty-four years old and the only thing I had ever been married to was a hose coupling on Site 41. My name was Matvei Ozerov. Propellant technician, third class. The old hands called the stuff we handled ‘the devil’s venom,’ and they said it the way you say the name of a dog that has already bitten you twice.",
      "I came from a village near Voronezh where the tallest thing was the church they had turned into a grain store. The Army sent me east instead of west, to a place that did not exist. Our letters home went to a post office box in a city we had never seen. The steppe at Tyuratam was so flat you could watch a man walk away from you for an hour, and in October the wind came off it like a blade dragged over a whetstone. But in the middle of that nothing they had built the future — pads, bunkers, rails, and the tall shape under the gantry that we were forbidden to name.",
      "She was the R-16. Yangel’s bird. You must understand what she meant: Korolev’s rockets drank kerosene and liquid oxygen, and liquid oxygen boils away — you cannot keep such a missile standing ready, you must fuel it while the enemy’s bombers are already warming their engines. Yangel’s answer was storable propellants. Unsymmetrical dimethylhydrazine in one tank, nitric acid oxidizer in the other. Hypergolic — the word meant the two liquids needed no spark, no ignition, no permission. Touch them together and they burn. That was the whole miracle of her, and the whole horror. A rocket that is always ready is a rocket that is always loaded.",
      "That autumn the whole cosmodrome could feel Moscow breathing on the back of its neck. Khrushchev had banged his shoe at the United Nations and told the world we were turning out missiles like sausages, and now somebody had to make the sausage real before the anniversary of the Revolution on the seventh of November. Marshal Nedelin himself flew down to command the launch — Chief Marshal of Artillery, a Hero of the Soviet Union, a man whose signature could move divisions. When the schedule began to slip, he had a chair carried out and set down within a few dozen meters of a fully fueled intercontinental missile, and he sat in it, so that everyone on the pad could see that the Marshal was not afraid. And because the Marshal was not afraid, none of us were permitted to be.",
      "By the twenty-fourth of October, everything on that pad was against regulation, and everyone knew it, and no one said it above a whisper. There had been leaks. Pyrotechnic membranes in the fuel lines had burst when they should not have, which meant acid was already sitting where acid should not sit. By every rule ever written we should have drained her, scrubbed her, stood her down for weeks. Instead the order came to fix her where she stood — fueled — because draining meant delay and delay meant explaining the delay to Moscow. I remember an engineer crouched under a valve, counting the drips of oxidizer against his watch. So many drops per minute was acceptable, he said. Acceptable. There were perhaps a hundred and fifty of us working around her that evening, riggers and testers and officers with clipboards, layered on the service platforms like men on scaffolding around a cathedral.",
      "My station was low, near the base, minding hoses and reading gauges whose needles I could have drawn from memory. Sanya was above me somewhere on the platforms — Aleksandr, my bunkmate, a Ukrainian with a laugh like a truck backfiring, who had promised that after the launch we would drink to the sausage-machine and to our mothers, in that order. Thirty minutes remained on the schedule. I remember that the floodlights had come on, and the steppe beyond them had gone from grey to black, and the frost was starting to bite through my gloves.",
      "What happened was a small thing. In the control equipment there was a programming current distributor — a drum of contacts, no bigger than a loaf of bread — and it had been left set in a position from an earlier test, and then someone brought it back to zero. The machine did not know we were standing on her. The machine only knew her sequence. And so, thirty minutes before her appointed time, with a hundred and fifty of us wrapped around her body, the second-stage engine received its command and lit.",
      "It lit directly above the full tanks of the first stage.",
      "I will tell you what I saw, because seeing it was the last work this body ever did. The light came first — not a flash but a pressure, a whiteness that stood the whole world up on end — and the torch of the second stage cut downward through the stage below it the way a welding rod goes through tin. Then the first-stage oxidizer let go, and the fire was no longer a torch but a tide. It went out across the pad in every direction at walking height, faster than any man runs. I saw men come down off the platforms burning. I saw men run with their coveralls alight and the fresh bitumen of the apron melting under them, holding their boots, so that they ran slower and slower like figures in a nightmare, and some reached the perimeter fence and the fence held them. The acid cloud came behind the flame, red-brown, rolling, and where the fire did not finish its work the vapor did. I ran. I want it recorded that I ran well, for a village boy. The light simply had further reach than my legs. It was not painful in the way you fear. It was fast, and then it was quiet, and then I was watching from somewhere the smoke could not climb to.",
      "From that quiet place I saw the rest, the parts no newspaper would print. I saw them identify Marshal Nedelin by the melted Gold Star on what remained of his chest, in the ashes of the place where his chair had stood. I saw Yangel weeping outside the bunker — alive only because, minutes before, he had stepped away behind the concrete to smoke a cigarette, and shame and tobacco had saved him where rank saved no one. I saw the count of the dead climb past what anyone would ever be told. And I saw the lie assembled with the same care we should have spent on the missile: Moscow announced that the Marshal had died in an aviation accident. A plane crash. The rest of us were not announced at all. Our mothers received coffins they were ordered not to open, or received nothing, and the files went into a safe, and the safe went into silence, and the silence held for twenty-nine years, until the country itself began to come apart at the welds and the truth of Site 41 finally leaked out of it like acid past a burst membrane, in 1989, when my mother was already in the ground beside the church that was a grain store.",
      "Here is what I have had a long time to think about, and it is this: they named the liquids wrong. Dimethylhydrazine, nitric acid — that was not the propellent. The propellent was the anniversary. The propellent was the shoe on the podium, the Marshal’s chair set out where everyone could see it, the engineer counting drips against his watch and calling it acceptable. Fear and haste are hypergolic. Bring them together and they need no spark. Everything else on that pad was only plumbing.",
      "They raised no stone for me, so let this one serve. Sanya — if you found your way to some other life, and I believe you did, I owe you the toast we never drank. To the sausage-machine, and to our mothers, in that order."
    ]

    farewell: "The next watch is never far off, shipmate. I'll see you there.",
    story: [
      "The morning of the tenth of October, I woke to a stillness that had no business belonging to that time of year. My name was Josiah Kirtland, ordinary seaman, sixteen years old and rated able only in my own head, aboard a merchantman lying at anchor in Carlisle Bay with a dozen other hulls, waiting on cargo and a fair wind north. The sky at dawn was the color of a bruise healing, that sick yellow-green old hands call a warning, and the air sat on my chest like a hand pressing down. Our sailing master, a Bristol man named Pierce who had rounded the Horn twice and buried a wife in three different ports, came up from below and looked at the glass bolted by the companionway, and I watched his face do something I had never seen it do. He did not curse. He went quiet, which was worse.",
      "By the ten o'clock the birds had gone. Not flown low, not scattered — gone, every gull and frigate bird vanished off the water as if the island itself had swallowed them, and the bay took on a flat, oily calm that made the other ships' boys point and laugh, not knowing what stillness like that is bought with. Pierce had us double every line before noon, sending down the topgallant yards, rousing out the second bower anchor, snugging everything a green boy like myself thought was already snug. Ashore, in Bridgetown, the shops stayed open. Carts still worked the road above the careenage. Only the old fishermen had already dragged their boats past the tideline and would not meet anyone's eye.",
      "It came out of the southeast a little after two, and I want it understood that no word I have for wind will serve. It did not blow so much as arrive, entire, as though the sea itself had been lifted up on one edge like a bedsheet and shaken. Our foretopmast went in the first hour, sheared clean at the cap with a sound I felt in my teeth more than heard, and the wreckage of it took two hands over the side with it before anyone could reach a knife to the rigging. Pierce was roaring orders that the wind ate before they reached the waist of the ship. I remember the bay itself seemed to be boiling, every vessel at anchor dragging or already gone, and through the driven spray and rain I saw — I am certain I saw — a full-rigged ship lifted stern-first and thrown, entire, up onto the careenage where no ship has business being, as though a child had discarded a toy.",
      "Our cables parted near four o'clock, both of them within a minute of each other, and after that we were no longer a vessel under any man's command but a hull at the mercy of a wind that had, by every account taken afterward, no equal in memory of any man living on that island or the next. The mainmast went the way the fore had gone, taking rigging and a length of the rail with it, and Pierce lashed himself and me both to what remained of the mizzen chains with a length of line, shouting into my ear that we would ride it out standing or we would ride it out drowned, and either way I was not to let go of him. I did not let go of him. I want that recorded, whatever else is forgotten of me: I did not let go.",
      "What I remember after that comes in pieces, the way memory does when the body has decided that whole hours are not worth keeping. The ship striking something — reef or another hull, I never learned which — and the deck canting so far over that the sea came aboard as though we had already sunk. Pierce's voice, and then no more of Pierce's voice, though his hands stayed lashed to mine long after I understood he was no longer the one holding on. Wreckage all about me in the water, spars and cordage and, once, unmistakably, a ship's bell tolling itself as it went under, rung by no hand at all. I do not know how long I was in that water. I know that the wind itself seemed to have a weight, that breathing meant choosing the half-second between gusts and hoping the sea granted it to you.",
      "I came ashore, or the sea put me ashore, sometime before the light changed — whether that was evening of the storm or the black hours after, I never worked out. I lay in the lee of a stone wall that had been, I later learned, the foundation of a merchant's warehouse before the wind took the rest of it, and I do not remember choosing to stop moving so much as simply stopping, the way a clock stops.",
      "Morning came clear. That is the detail no one who was not there ever quite believes — that the eleventh of October dawned bright and mild over Barbados, the sky rinsed and blameless, as if the day before had been some other island's grief entirely. I want to tell it exactly as I found it, because I have never since trusted a calm sky to mean what it says. The bay that had held a dozen tall ships the previous dawn now held driftwood. Carlisle Bay was simply gone as a harbor — every vessel anchored there dismasted, stove in, or vanished outright, some driven half a mile inland through streets that no longer had houses on them to mark the way. The great trees along the shore road stood bare and white, stripped of bark and leaf both by wind alone, standing like the bones of trees rather than the trees themselves. Bridgetown was rubble to the waterline. I walked among it for the better part of that morning, sixteen years old, salt-blind, looking for any face from my ship and finding none, while soldiers and slaves and merchants alike moved through the wreckage in a silence that had nothing left in it to say.",
      "They would count the dead across those islands for weeks after, and never finish counting properly — Barbados alone lost thousands in a single afternoon, Martinique and St. Lucia and St. Vincent after it, whole French and British fleets that had been maneuvering for advantage in a war neither storm nor sea cared one particle about. Admiral Rodney himself was away in New York and came back to a station he no longer recognized. I have read, in the years since, that no hurricane before or since has taken so many lives in the Atlantic in a single passage. I did not need the number. I had the bare poles of my own ship's masts, the ones still visible above the waterline of Carlisle Bay for a full year afterward, to remind me every time I looked toward open water.",
      "I signed aboard another vessel eleven months later, because a sailor who will not go back to sea is not really a sailor, only a man who happened once to survive it. Pierce's knot was still around my wrist when they found me — I had not been able to make my fingers untie it, and in the end I cut it rather than pick it loose, and I have never been sorry that I kept the piece of line."
    ]
  },
  // AUTO-INSERT-NEW-CHAPTER-ABOVE-THIS-LINE

const TOTAL_LIVES = 9999;
const roman = n => {
  const map = [[1000,"M"],[900,"CM"],[500,"D"],[400,"CD"],[100,"C"],[90,"XC"],
               [50,"L"],[40,"XL"],[10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]];
  let out = "";
  for (const [v, s] of map) { while (n >= v) { out += s; n -= v; } }
  return out;
};
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function renderYard(){
  const yard = document.getElementById("yard");
  const tally = document.getElementById("tally");
  tally.textContent = `${CHAPTERS.length} of ${TOTAL_LIVES.toLocaleString()} lives recorded`;

  if (!CHAPTERS.length){
    yard.innerHTML = `
      <div class="fallow">
        <div class="glyph">&#10086;</div>
        <p>No lives have been recorded yet. Speak a number, and the first stone will be raised.</p>
      </div>`;
    return;
  }

  yard.innerHTML = `<div class="yard">` + CHAPTERS.map(c => `
    <a class="stone" href="#life-${c.num}">
      ${c.image
        ? `<img class="art" src="${c.image}" alt="Artwork for ${esc(c.title)}">`
        : `<div class="art empty" aria-hidden="true">${roman(c.num)}</div>`}
      <div class="num">Life ${roman(c.num)}</div>
      <h2>${esc(c.title)}</h2>
      <div class="seed">seed ${c.seed} &middot; &ldquo;${esc(c.word)}&rdquo;</div>
      <div class="era">${esc(c.era)}</div>
    </a>`).join("") + `</div>`;
}

function renderReader(num){
  const i = CHAPTERS.findIndex(c => c.num === num);
  const reader = document.getElementById("reader");
  if (i === -1){ closeReader(); return; }
  const c = CHAPTERS[i], prev = CHAPTERS[i-1], next = CHAPTERS[i+1];

  reader.innerHTML = `
    <a class="backlink" href="#">&larr; Return to the yard</a>
    <header>
      ${c.image ? `<img class="art-hero" src="${c.image}" alt="Artwork for ${esc(c.title)}">` : ""}
      <div class="num">Life ${roman(c.num)} of ${TOTAL_LIVES.toLocaleString()}</div>
      <h1>${esc(c.title)}</h1>
      <div class="seedline">seed ${c.seed} conjured &ldquo;${esc(c.word)}&rdquo;</div>
      <div class="era">${esc(c.era)}</div>
    </header>
    <div class="story">${c.story.map(p => `<p>${esc(p)}</p>`).join("")}</div>
    <p class="farewell">${esc(c.farewell)}</p>
    <nav class="turn">
      ${prev ? `<a href="#life-${prev.num}">&larr; Life ${roman(prev.num)}</a>` : `<span></span>`}
      <span class="spacer"></span>
      ${next ? `<a href="#life-${next.num}">Life ${roman(next.num)} &rarr;</a>` : `<span></span>`}
    </nav>`;
  reader.classList.add("active");
  document.body.classList.add("reading");
  window.scrollTo(0,0);
}

function closeReader(){
  document.getElementById("reader").classList.remove("active");
  document.body.classList.remove("reading");
}

function route(){
  const m = location.hash.match(/^#life-(\d+)$/);
  if (m) renderReader(parseInt(m[1],10));
  else closeReader();
}

renderYard();
route();
window.addEventListener("hashchange", route);
</script>
